<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BLE UID Viewer</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #log { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; margin-top: 20px; height: 200px; overflow-y: auto; }
    button { font-size: 18px; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>BLE UID Viewer</h1>
  <button id="connect">ESP32 に接続</button>
  <div id="status"></div>
  <div id="log"></div>

  <script>
    const SERVICE_UUID = '12345678-1234-1234-1234-1234567890ab';
    const CHAR_UUID    = 'abcd1234-5678-90ab-cdef-1234567890ab';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const btn = document.getElementById('connect');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    btn.addEventListener('click', async () => {
      try {
        statusEl.textContent = 'デバイスを検索中…';

        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });

        statusEl.textContent = '接続中…';
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHAR_UUID);

        await characteristic.startNotifications();
        statusEl.textContent = '接続完了！タグをかざしてください。';

        characteristic.addEventListener('characteristicvaluechanged', event => {
          const value = new TextDecoder().decode(event.target.value);
          log(`UID: ${value}`);
           sendToGAS(value); 
        });

      } catch (e) {
        statusEl.textContent = 'エラー: ' + e;
        log('エラー: ' + e);
      }
    });
    // --- UID → 名前辞書 ---
const uidToName = {
  "0457D0827E2491": "1課_小池",
  "0457CF827E2491": "1課_豊口",
  "0457CE827E2491": "1課_三原",
  "0457CD827E2491": "2課_小暮",
  "0457CC827E2491": "2課_時岡",
  "0457CB827E2491": "1課_齋藤",
  "0401020304": "中村",
  "04ABCDEF12": "小林",
  "04FEDCBA98": "加藤",
  "0411223344": "渡辺"
};

// --- 取り出し / 収納ステータス ---
let lastStatus = {};

function getStatus(uid) {
  if (!lastStatus[uid] || lastStatus[uid] === "in") {
    lastStatus[uid] = "out";
    return "取り出し";
  } else {
    lastStatus[uid] = "in";
    return "収納";
  }
}

// --- タイムスタンプ ---
function getTimestamp() {
  return new Date().toLocaleString("ja-JP");
}

// --- GAS 送信 ---
const GAS_URL = "https://script.google.com/a/macros/anams.co.jp/s/AKfycbzqtgBMT3_mCVUtAU0GtIwnwsPtcFabVmZwkDCjYhip5mVO1SOvW3Vx7_LAq_ak5bCz/exec;

function sendToGAS(uid) {
  const name = uidToName[uid] || "不明";
  const status = getStatus(uid);
  const timestamp = getTimestamp();

  const data = {
    uid: uid,
    name: name,
    status: status,
    timestamp: timestamp
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => log(`GAS送信成功: ${JSON.stringify(data)}`))
  .catch(err => log(`GAS送信エラー: ${err}`));
}

  </script>
</body>
</html>
